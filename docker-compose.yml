version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: mention_monitor_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: mention_monitor
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d mention_monitor"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mention_monitor_redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mention_monitor_backend
    restart: always
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://admin:admin@db/mention_monitor
      REDIS_URL: redis://redis:6379/0
      SELENIUM_URL: http://selenium:4444/wd/hub
    volumes:
      - ./backend:/app
      - google_creds:/app/creds
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mention_monitor_celery_worker
    restart: always
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://admin:admin@db/mention_monitor
      REDIS_URL: redis://redis:6379/0
      SELENIUM_URL: http://selenium:4444/wd/hub
    volumes:
      - ./backend:/app
      - google_creds:/app/creds
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A workers.celery_app worker --loglevel=info --concurrency=4

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mention_monitor_celery_beat
    restart: always
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://admin:admin@db/mention_monitor
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A workers.celery_app beat --loglevel=info --scheduler celery.beat.PersistentScheduler

  frontend:
    image: node:20-alpine
    container_name: mention_monitor_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev -- --host"

  selenium:
    image: selenium/standalone-chrome:latest
    container_name: mention_monitor_selenium
    restart: always
    shm_size: 2gb
    ports:
      - "4444:4444"
    environment:
      SE_NODE_MAX_SESSIONS: 5

volumes:
  postgres_data:
  google_creds:
